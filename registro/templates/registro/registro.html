<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">
    <h1>Formulario de registro</h1>
    <div class="row d-flex justify-content-center">
<div class="card p-3 mt-4 shadow-lg border-0" style="width: 75%;">
        <h3>Ingresa los datos del alumno</h3>
        <form method="post"> {% csrf_token %}
        <div class="row">
        {% for field in form %}
        <div class="col-4 mb-3">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div style="color: red;">
                {{ field.errors|striptags }}
            </div>
            {% endif %}
        </div>
        {% endfor %}
        </div>

        <div class="row display-flex justify-content-end mt-5">
            <div class="col-3">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar</button>
            </div>
        </div>
    </form>
    {% if success %}
    <p style="color: green;">¡Datos impresos en consola correctamente!</p>
    {% endif %}
    </div>
    </div>
    
    

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
